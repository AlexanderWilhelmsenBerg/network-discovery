<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Homelab Control Service</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">Homelab Control Service</div>
    <nav class="tabs">
      <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
      <a href="/discovery" class="{% if request.url.path.startswith('/discovery') %}active{% endif %}">Discovery</a>
      <a href="/homelab" class="{% if request.url.path.startswith('/homelab') %}active{% endif %}">Homelab</a>
      <a href="/devices" class="{% if request.url.path.startswith('/devices') %}active{% endif %}">Devices</a>
    </nav>
  </header>
  <main class="page-wrap">
    {% if flash %}
      <div class="flash flash-{{ flash.level }}">{{ flash.message }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
